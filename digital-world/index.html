<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheenaSim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
    canvas { display: block; }

    #login-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,10,20,0.92);
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #login-overlay.visible { display: flex; }

    #login-box {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 32px 40px;
      display: flex; flex-direction: column; gap: 16px;
      min-width: 300px;
      color: #e0e0e0;
    }
    #login-box h2 { color: #9b59b6; letter-spacing: 2px; font-size: 1.1rem; }
    #login-box input {
      background: #0d1b2a; border: 1px solid #0f3460; color: #e0e0e0;
      padding: 10px 12px; border-radius: 4px; font-family: monospace; font-size: 0.9rem;
    }
    #login-box input:focus { outline: none; border-color: #9b59b6; }
    #login-btn {
      background: #9b59b6; color: #fff; border: none;
      padding: 10px; border-radius: 4px; cursor: pointer;
      font-family: monospace; font-size: 0.95rem; letter-spacing: 1px;
    }
    #login-btn:hover { background: #8e44ad; }
    #login-error { color: #e74c3c; font-size: 0.8rem; display: none; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <div id="login-box">
      <h2>CHEENASIM</h2>
      <input id="login-email" type="email" placeholder="email" autocomplete="username" />
      <input id="login-password" type="password" placeholder="password" autocomplete="current-password" />
      <button id="login-btn">sign in</button>
      <span id="login-error"></span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
